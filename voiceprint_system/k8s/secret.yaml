# ==============================================================================
# 🎙️ WhisperX Voiceprint System - Kubernetes Secret 敏感配置模板
# ==============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: whisperx-secrets
  namespace: default
type: Opaque
stringData:
  # 请在此处填入您的 API 密钥明文（K8s 会自动进行 Base64 编码）
  DEEPSEEK_API_KEY: "your_deepseek_api_key_here"
  GOOGLE_API_KEY: "your_gemini_api_key_here"
