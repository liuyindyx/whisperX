# ==============================================================================
# 🎙️ WhisperX Voiceprint System - Kubernetes 持久化存储 PVC 配置
# ==============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: whisperx-storage-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  # 若 Kubernetes 集群支持动态存储卷供应，可选择指定 storageClassName
  # storageClassName: standard
  resources:
    requests:
      storage: 20Gi  # 推荐至少 20Gi，因为 PyAnnote / WhisperX / SpeechBrain 模型较大
